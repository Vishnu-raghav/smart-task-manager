  <div class="modal-overlay" id="todoModal">
   <div class="modal">

    <div class="modal-header">
      <h4></h4>
      <button class="close-modal" type="button">Go Back</button>
    </div>

    <form class="modal-form" id="todoForm">

      <div class="modal-input">
        <label>Title</label>
        <input type="text" id="task-title" name="title" placeholder="Enter title" required />
      </div>

      <div class="modal-input">
        <label>Priority</label>
        <select name="priority" id="task-priority"></select>
      </div>

      <div class="modal-input">
        <label>Category</label>
        <select name="category" id="task-category">
        <option value="">Select category</option>
        <option value="Personal">Personal</option>
        <option value="Study">Study</option>
        <option value="Work">Work</option>
        <option value="Urgent">Urgent</option>
  </select>
      </div>

      <div class="modal-input">
        <label>Due Date</label>
        <input type="date" id="task-date" name="dueDate" />
      </div>

      <div class="task-description">
        <div class="modal-input">
          <label>Description</label>
          <input
            type="text"
            id="task-desc"
            name="desc"
            placeholder="Enter description"
          />
        </div>

        <div class="upload-box" id="uploadBox">
          <input
            type="file"
            id="modal-file-input"
            name="image"
            accept="image/*"
            hidden
          />

          <div class="upload-content">
            <i class="fa-regular fa-image upload-icon"></i>
            <p><b>Drag & Drop</b> image here</p>
            <span>or</span>
            <button type="button" class="browse-btn">Browse</button>
          </div>

          <img id="previewImg" class="preview-img" />
        </div>
      </div>
    </form>

  

  <button type="submit" form="todoForm"></button>
