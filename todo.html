<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smart-todo-app</title>
    <script src="https://kit.fontawesome.com/76b4967fa9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="CSS/general.css">
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/sidebar.css">
    <link rel="stylesheet" href="CSS/MyTask.css">
</head>
<body>
    <header class="Todo-header">
      <div class="todo-logo"><span style="color: rgb(255, 136, 93);">Smart</span>-todo-app</div>

      <div class="todo-search-container">
         <input type="text" id="task-search-input" placeholder="search your task here">
         <button id="todo-search-button">
            <img id="search-img" src="assets/search-icon-img.png" alt="srch">
         </button>

        <!-- Floating dropdown -->
        <div class="todo-dropdown show" id="todoDropdown">
          <div class="search-output">
            <p>Buy milk</p>
            <span>Personal</span>
          </div>
          <div class="search-output">
           <p>Study JS</p>
           <span>Study</span>
          </div>
        </div>
      </div>

      <div class="calender">
        calender
      </div>
    </header>

    <aside class="sidebar close">
      <div class="sidebar-header">
        <i class="fa-solid fa-chevron-right toggle" ></i>
      </div>

      <div class="menu-bar">
        <ul class="menu-link">
           <li class="nav-link">
            <a href="#">
              <i class="fa-regular fa-house icon"></i>
              <span class="text nav-text">My Task</span>
            </a>
           </li>
           <li class="nav-link">
            <a href="#">
              <i class="fa-sharp fa-solid fa-bars icon"></i>
              <span class="text nav-text">Task Categories</span>
            </a>
           </li>
           <li class="nav-link">
            <a href="#">
              <i class="fa-solid fa-exclamation icon"></i>
              <span class="text nav-text">Vital Task</span>
            </a>
           </li>
        </ul>
      </div>
    </aside>

    <main class="home">
      <div class="grid-container">
         <div class="grid-left-area">
          <div class="header">
            <div class="My-task-todo">
              <span>To-do</span>
            </div>
            <div class="MyTask-Popup">pop-up</div>
            <div class="Add-Task">
              <span>Add Task</span>
            </div>
          </div>
         </div>
         <div class="grid-right-area">right</div>
      </div>    
    </main>
</body>
<script src="Js/sidebar.js"></script>
</html>
